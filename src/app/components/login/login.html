<link rel="stylesheet" href="./login.css">

<div class="modal-overlay">
  
  <div class="glass-panel modal-box">
    
    <button class="close-btn" (click)="onCerrarClick()">X</button>

    <div class="auth-header">
      <img src="assets/logo-tripnjoy.png" alt="Trip N' Joy" class="auth-logo">
      <h2>Iniciar Sesión</h2>
      <p>Bienvenido de nuevo a tu próxima aventura</p>
    </div>

    <form class="auth-form">
      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <i class="icon-mail">✉</i>
          <input type="email" id="email" placeholder="viajero@ejemplo.com" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i class="icon-lock">🔒</i>
          <input type="password" id="password" placeholder="********" required>
        </div>
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <div class="auth-footer">
      <p>¿No tienes una cuenta? <a href="#">Regístrate aquí</a></p>
    </div>
    </div>
</div>
