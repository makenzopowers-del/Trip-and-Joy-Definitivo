<link rel="stylesheet" href="./registro.css">
<div class="auth-container">
  <div class="glass-panel">
    <div class="auth-header">
      <img src="assets/logo-tripnjoy.png" alt="Trip N' Joy" class="auth-logo">
      <h2>Crea tu cuenta</h2>
      <p>Comienza tu próxima gran aventura hoy mismo</p>
    </div>

    <form class="auth-form">
      <div class="form-row">
        <div class="input-group">
          <label for="nombre">Nombre</label>
          <div class="input-wrapper">
            <i>👤</i>
            <input type="text" id="nombre" placeholder="Tu nombre" required>
          </div>
        </div>
        <div class="input-group">
          <label for="apellidos">Apellidos</label>
          <div class="input-wrapper">
            <input type="text" id="apellidos" placeholder="Tus apellidos" required>
          </div>
        </div>
      </div>

      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <i>✉️</i>
          <input type="email" id="email" placeholder="viajero@ejemplo.com" required>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i>🔒</i>
          <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
        </div>
      </div>

      <div class="input-group">
        <label for="confirm-password">Confirmar Contraseña</label>
        <div class="input-wrapper">
          <i>🔐</i>
          <input type="password" id="confirm-password" placeholder="Repite tu contraseña" required>
        </div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" required>
        <label for="terms">Acepto los <a href="#">Términos y Condiciones</a> y la <a href="#">Política de Privacidad</a></label>
      </div>

      <button type="submit" class="btn-primary">Registrarse</button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes una cuenta? <a href="#">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>
